name: Lighthouse

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build with an empty basePath so the static export serves correctly at the
      # root for the local perf server (the deploy workflow builds with the Pages
      # basePath separately).
      - name: Build static export
        run: pnpm run build
        env:
          GITHUB_REPOSITORY: ""

      # Runs scripts/perf-server.mjs + Lighthouse against the URLs in
      # lighthouserc.json and fails the job if the perf budget regresses.
      # Chrome is preinstalled on the ubuntu runner.
      - name: Lighthouse CI assert
        run: pnpm exec lhci autorun
